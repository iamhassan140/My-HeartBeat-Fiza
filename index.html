<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 6 — My Heartbeat 💓</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0005;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;padding:20px}
h1{font-family:'Comic Sans MS',cursive;color:#ff6b8a;font-size:clamp(1.2rem,4vw,2rem);text-align:center;margin-bottom:8px;text-shadow:0 0 20px #f06}
.sub{font-family:'Comic Sans MS',cursive;color:rgba(255,100,140,0.5);font-size:0.85rem;text-align:center;margin-bottom:40px}
.heart-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin:20px 0}
.heart{font-size:clamp(6rem,20vw,10rem);animation:hb 1s ease-in-out infinite;filter:drop-shadow(0 0 30px #f06)}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}42%{transform:scale(1.2)}70%{transform:scale(1)}}
canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.name{font-family:'Comic Sans MS',cursive;font-size:clamp(1.5rem,6vw,3rem);color:#fff;text-align:center;margin:20px 0;text-shadow:0 0 20px #f06;letter-spacing:4px}
.bpm{font-family:'Poppins',sans-serif;color:rgba(255,100,140,0.6);font-size:0.85rem;text-align:center;letter-spacing:2px}
.msg{font-family:'Comic Sans MS',cursive;color:rgba(255,180,200,0.7);font-size:clamp(0.8rem,2.5vw,1rem);text-align:center;max-width:360px;line-height:1.8;margin-top:30px}
</style>
</head>
<body>
<h1>💓 My Heart Beats For You</h1>
<p class="sub">Always. Every single beat.</p>
<div class="heart-wrap">
  <div class="heart">❤️</div>
</div>
<div class="name">Madam G</div>
<p class="bpm">♥ 72 BPM — every beat, yours</p>
<p class="msg">Every heartbeat is a tiny reminder — you are the reason I feel alive. 🌹</p>
<script>
// Ripple effect on click
document.querySelector('.heart').addEventListener('click',function(){
  this.style.animationDuration='0.5s';
  setTimeout(()=>this.style.animationDuration='1s',1000);
});
</script>
</body>
</html>
